name: Deploy justinstone.online to VPS

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: justinstone-online-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment:
      name: justinstone-online-vps
      url: https://justinstone.online

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Check public build
        run: ./scripts/check_public_build.sh

      - name: Install SSH key
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          test -n "$VPS_SSH_PRIVATE_KEY"
          test -n "$VPS_KNOWN_HOSTS"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy static site
        env:
          DEPLOY_HOST: ${{ secrets.VPS_DEPLOY_HOST }}
          DEPLOY_DOMAIN: justinstone.online
        run: ./scripts/deploy_static_vps.sh
