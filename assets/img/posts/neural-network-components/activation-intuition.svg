<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Activation function intuition</title>
  <desc id="desc">A diagram comparing a straight-line response with a bent non-linear response to show why activation functions matter.</desc>
  <rect width="960" height="420" rx="24" fill="#ffffff"/>
  <rect x="40" y="40" width="880" height="340" rx="20" fill="#f8fafc" stroke="#d0d7de" stroke-width="2"/>
  <text x="70" y="92" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#111827">Why activation functions matter</text>
  <text x="70" y="125" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#475467">Without non-linearity, stacking layers mostly behaves like one simple straight-line transform.</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="90" y="150" width="350" height="180" rx="18" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>
    <text x="265" y="185" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Without activation</text>
    <text x="265" y="212" text-anchor="middle" font-size="16" fill="#475467">The model stays too linear.</text>
    <line x1="140" y1="290" x2="390" y2="290" stroke="#64748b" stroke-width="3"/>
    <line x1="170" y1="315" x2="170" y2="170" stroke="#64748b" stroke-width="3"/>
    <line x1="185" y1="275" x2="355" y2="205" stroke="#ef4444" stroke-width="5"/>

    <rect x="520" y="150" width="350" height="180" rx="18" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>
    <text x="695" y="185" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">With activation</text>
    <text x="695" y="212" text-anchor="middle" font-size="16" fill="#475467">The model can bend to fit richer patterns.</text>
    <line x1="570" y1="290" x2="820" y2="290" stroke="#64748b" stroke-width="3"/>
    <line x1="600" y1="315" x2="600" y2="170" stroke="#64748b" stroke-width="3"/>
    <path d="M615 275 C660 275, 660 260, 700 235 S770 190, 805 180" fill="none" stroke="#22c55e" stroke-width="5"/>
  </g>
</svg>
