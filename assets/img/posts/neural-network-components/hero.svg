  <text x="160" y="660" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#cbd5e1">A practical mental model for layers, weights,</text>
  <text x="160" y="698" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#cbd5e1">biases, activations, and backpropagation.</text>
