    <circle cx="970" cy="250" r="28" fill="#22c55e"/>
    <circle cx="970" cy="450" r="28" fill="#22c55e"/>
    <circle cx="970" cy="650" r="28" fill="#22c55e"/>

    <circle cx="1210" cy="210" r="28" fill="#f59e0b"/>
