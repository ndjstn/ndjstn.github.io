    <line x1="820" y1="330" x2="930" y2="450"/>
    <line x1="820" y1="450" x2="930" y2="250"/>
    <line x1="820" y1="450" x2="930" y2="450"/>
    <line x1="820" y1="450" x2="930" y2="650"/>
    <line x1="820" y1="570" x2="930" y2="450"/>
