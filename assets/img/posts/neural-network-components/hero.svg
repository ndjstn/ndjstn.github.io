  <rect x="110" y="150" width="560" height="520" rx="28" fill="#0b1120" opacity="0.72" stroke="#334155" stroke-width="2"/>
  <text x="160" y="245" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#93c5fd">Data Science • Machine Learning</text>
  <text x="160" y="330" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="700" fill="#ffffff">Understanding</text>
  <text x="160" y="408" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="700" fill="#ffffff">the Component</text>
  <text x="160" y="486" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="700" fill="#ffffff">Parts of Neural</text>
