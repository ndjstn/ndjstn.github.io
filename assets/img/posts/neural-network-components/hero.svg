<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Understanding the component parts of neural networks</title>
  <desc id="desc">A hero illustration showing a stylized neural network over a gradient background with the article title.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="250" cy="160" r="180" fill="#38bdf8" opacity="0.08"/>
  <circle cx="1360" cy="720" r="220" fill="#22c55e" opacity="0.08"/>
  <circle cx="1120" cy="180" r="140" fill="#f59e0b" opacity="0.08"/>

  <g stroke="#94a3b8" stroke-width="4" opacity="0.55">
