<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Neural network overview</title>
  <desc id="desc">A diagram showing information moving from an input layer through two hidden layers to an output layer.</desc>
  <rect width="960" height="420" rx="24" fill="#ffffff"/>
  <rect x="40" y="40" width="880" height="340" rx="20" fill="#f8fafc" stroke="#d0d7de" stroke-width="2"/>
  <text x="70" y="92" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#111827">From raw input to useful prediction</text>
  <text x="70" y="125" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#475467">Each layer transforms the representation before handing it to the next layer.</text>

  <g stroke="#94a3b8" stroke-width="3" fill="none">
    <line x1="190" y1="170" x2="375" y2="170"/>
    <line x1="190" y1="210" x2="375" y2="210"/>
    <line x1="190" y1="250" x2="375" y2="250"/>
    <line x1="190" y1="290" x2="375" y2="290"/>

    <line x1="485" y1="170" x2="670" y2="170"/>
    <line x1="485" y1="210" x2="670" y2="210"/>
    <line x1="485" y1="250" x2="670" y2="250"/>
    <line x1="485" y1="290" x2="670" y2="290"/>

    <line x1="780" y1="210" x2="840" y2="210"/>
  </g>

  <g>
    <rect x="90" y="150" width="100" height="160" rx="18" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <text x="140" y="135" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">Input</text>
    <circle cx="140" cy="180" r="16" fill="#60a5fa"/>
    <circle cx="140" cy="220" r="16" fill="#60a5fa"/>
    <circle cx="140" cy="260" r="16" fill="#60a5fa"/>
    <circle cx="140" cy="300" r="16" fill="#60a5fa"/>
  </g>

  <g>
    <rect x="375" y="150" width="110" height="160" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="430" y="135" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#15803d">Hidden 1</text>
    <circle cx="430" cy="180" r="16" fill="#22c55e"/>
    <circle cx="430" cy="220" r="16" fill="#22c55e"/>
    <circle cx="430" cy="260" r="16" fill="#22c55e"/>
    <circle cx="430" cy="300" r="16" fill="#22c55e"/>
  </g>

  <g>
    <rect x="670" y="150" width="110" height="160" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="725" y="135" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#b45309">Hidden 2</text>
    <circle cx="725" cy="180" r="16" fill="#f59e0b"/>
    <circle cx="725" cy="220" r="16" fill="#f59e0b"/>
    <circle cx="725" cy="260" r="16" fill="#f59e0b"/>
    <circle cx="725" cy="300" r="16" fill="#f59e0b"/>
  </g>

  <g>
    <rect x="840" y="175" width="60" height="70" rx="16" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="870" y="160" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#b91c1c">Output</text>
    <circle cx="870" cy="210" r="16" fill="#ef4444"/>
  </g>
</svg>
