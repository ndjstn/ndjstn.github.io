server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name justinstone.online www.justinstone.online;

    root /srv/www/justinstone.online/current;
    index index.html;

    access_log /var/log/nginx/justinstone.online.access.log;
    error_log /var/log/nginx/justinstone.online.error.log;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        try_files $uri $uri/ /404.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
