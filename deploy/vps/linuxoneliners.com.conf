server {
    listen 80;
    listen [::]:80;
    server_name linuxoneliner.com www.linuxoneliner.com linuxoneliners.com www.linuxoneliners.com;
    return 301 https://linuxoneliners.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name linuxoneliner.com www.linuxoneliner.com linuxoneliners.com www.linuxoneliners.com;

    ssl_certificate /etc/letsencrypt/live/linuxoneliners.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linuxoneliners.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    if ($host != linuxoneliners.com) {
        return 301 https://linuxoneliners.com$request_uri;
    }

    root /srv/www/linuxoneliners.com/current;
    index index.html;

    access_log /var/log/nginx/linuxoneliners.com.access.log;
    error_log /var/log/nginx/linuxoneliners.com.error.log;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /api/events {
        proxy_pass http://127.0.0.1:8091/api/events;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
        client_max_body_size 32k;
    }

    location = /api/health {
        proxy_pass http://127.0.0.1:8091/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
