domain: example.com
owner: Justin Stone
purpose: Portfolio, content, product, or resale candidate
repo: https://github.com/ndjstn/example
runtime: static
stage: experiment
state: live
success_metric: qualified leads, useful traffic, sales, or portfolio credibility
kill_date:
promotion_status: not-promoted
automation:
  deploy: manual
  backup: manual
  promote_content: manual
  pause: manual
  health_check: automatic
edge:
  proxy: nginx
  tls: certbot
deployment:
  strategy: immutable-release-folder
  release_root: /srv/www/example.com/releases
  current_symlink: /srv/www/example.com/current
database:
  engine: none
  name:
  user:
data:
  collected:
    - aggregate analytics
  personal_data: false
  privacy_policy_url:
  retention_period:
backups:
  schedule:
  restore_check:
communications:
  inbound:
    - contact form
  outbound:
    - email follow-up
analytics:
  public_metrics:
    - page views
    - referrers
    - conversions
  private_metrics:
    - raw contact submissions
handoff:
  sale_candidate: false
  export_allowed: aggregate-only
  package:
    - source code
    - deployment docs
    - static assets
    - domain transfer instructions
    - anonymized analytics summary
